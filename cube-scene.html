<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Interactive 3D Room Cube Scene</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="cube-scene.css" />
</head>

<body>
    <main>
        <div class="scene-wrapper">
            <div class="scene">
                <div class="cube">
                    <div class="cube__face cube__face--front">
                        <div class="door-container">
                            <div class="door-window"></div>
                            <div class="door-handle"></div>
                        </div>
                        <div class="door-sticky-note"></div>
                    </div>
                    <div class="cube__face cube__face--right">
                        <div class="industrial-lamp"></div>
                        <div class="lamp-light-beam"></div>
                        <div class="notes-container">
                            <div class="note">
                                <img class="note-image" src="assets/fav_icon/A-Sweet-Kid 370.webp.webp"
                                    alt="A Sweet Kid">
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                            <div class="note">
                                <div class="note-content"></div>
                            </div>
                        </div>
                    </div>
                    <div class="cube__face cube__face--back"></div>
                    <div class="cube__face cube__face--left"></div>
                    <div class="cube__face cube__face--top"></div>
                    <div class="cube__face cube__face--bottom"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="cube-scene.js?v=2"></script>
</body>

</html>
