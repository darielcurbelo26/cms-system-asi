<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <link rel="stylesheet" href="style.css">
    <script src="design-system.js?v=2"></script>
    <style>
        .password-page-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Sync with .section_hero padding from style.css */
            padding: .75rem .75rem 4% .75rem;
            width: 100%;
            height: 100dvh;
            box-sizing: border-box;
            position: relative;
        }

        /* Typography Hierarchy matches the site */
        .launch-info {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.95rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            opacity: 0.8;
            transition: color var(--theme-transition);
        }

        .section_hero-title-password {
            font-family: "Inter", sans-serif;
            font-size: clamp(3rem, 15vw, 15rem);
            font-weight: 950;
            letter-spacing: -0.07em;
            line-height: 0.8;
            margin-bottom: clamp(.5rem, 5vw, .5rem);
               margin-top: clamp(.5rem, 5vw, .5rem);
            text-transform: uppercase;
            color: var(--text-color);
            width: 100%;
            /* Identical style from main section_hero */
            filter: blur(0.5px);
            -webkit-text-stroke-width: 0.04em;
            -webkit-text-stroke-color: var(--text-color);
            transform: scale(1.1);
            will-change: filter, transform;
            user-select: none;
            transition: color var(--theme-transition), -webkit-text-stroke-color var(--theme-transition);
        }

        /* Form Layout */
        .password-form {
            display: flex;
            gap: 0.5rem;
            align-items: stretch;
            width: min(90%, 500px);
            margin-top: 1rem;
             margin-bottom: 1rem;

        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
        }

        .password-field {
            width: 100%;
            padding: 0.75rem 1rem;
            padding-right: 3rem;
            background-color: transparent;
            border: 1px solid var(--border-color);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            border-radius: 0;
            box-sizing: border-box;
            outline: none;
            color: var(--text-color);
            transition: border-color var(--theme-transition), color var(--theme-transition);
        }

        .toggle-password-v {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            display: flex;
            align-items: center;
            opacity: 0.6;
            color: var(--text-color);
            transition: opacity var(--theme-transition), color var(--theme-transition);
        }

        .toggle-password-v:hover {
            opacity: 1;
        }

        .enter-button {
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 0 1.5rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0;
            color: var(--text-color);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            transition:
                background-color var(--theme-transition),
                color var(--theme-transition),
                border-color var(--theme-transition),
                opacity var(--theme-transition);
        }

        .enter-button:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .section_hero-title-password {
                margin-bottom: clamp(1rem, 4vw, 2.5rem);
            }
        }

        @media (max-width: 400px) {
            .password-form {
                flex-direction: row;
                align-items: center;
                gap: 1rem;
            }

            .input-wrapper {
                width: 100%;
            }

            .enter-button {
                width: auto;
                padding: 0.9rem 1rem;
                height: auto;
            }
        }
    </style>
</head>

<body class="body_fixed">

            </a>
            <div class="nav_button difference-text" id="nav_button-menu">

                <div></div>

    </nav>

    <div class="page-wrapper">
        <!-- Toggles at the bottom left -->
        <div class="fixed-controls_component">

        </div>

        <!-- Right Navbar Sidebar -->
        <nav class="nav_menu">
            <div class="nav_container nav_menu-container">
                <div class="nav_list">
                    <a href="/" class="text-style-nav nav_link">
                        <span class="hover-split-text">
                            <span class="text-inner">The gist</span>
                            <span class="text-outer">The gist</span>
                        </span>
                    </a>
                    <a href="projects" class="text-style-nav nav_link">
                        <span class="hover-split-text">
                            <span class="text-inner">Projects</span>
                            <span class="text-outer">Projects</span>
                        </span>

                    <a href="about" class="text-style-nav nav_link">

                <div class="nav_list social_list">
                    <a href="https://x.com" target="_blank" class="social_link"><img src="assets/social_icons/xx.svg"
                            alt="xx"></a>
                    <a href="mailto:ejemplo@correo.com" class="social_link"><img src="assets/social_icons/mail.svg"

        <section class="password-page-content">
            <div class="launch-info">LAUNCHING ON FEBRUARY 7TH AT 7PM CST</div>
            <h1 class="section_hero-title-password">ASWEETKID</h1>

            <form id="pForm" class="password-form">
                <div class="input-wrapper">
                    <input type="password" id="pInput" class="password-field" placeholder="This is the password">
                    <div class="toggle-password-v" id="tPass">
                        <!-- Eye icon SVG -->
                        <svg id="eOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eClosed" style="display:none;" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </div>
                </div>
                <button type="submit" class="enter-button">ENTER</button>
            </form>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js?v=3"></script>
    <script>
        let redirectPage = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
        let pageName = redirectPage.split('/').pop().split('?')[0];
        // Normalize: URLs without a .html extension (pretty URLs) must still
        // match the page_file stored on the tatc_gate post (e.g. "blog.html").
        if (!pageName.includes('.')) pageName += '.html';
        const unlockKey = 'tatc-unlocked-' + pageName;

        // Immediately redirect if this specific gate is already unlocked.
        // Each page has its own key — unlocking one gate must not unlock the rest.
        if (sessionStorage.getItem(unlockKey) === 'true') {
            window.location.replace(redirectPage);
        }

        const pForm = document.getElementById('pForm');
        const pInput = document.getElementById('pInput');
        const enterBtn = pForm.querySelector('.enter-button');
        const gateTitle = document.querySelector('.section_hero-title-password');
        const gateInfo = document.querySelector('.launch-info');

        // Load gate title/description from CMS (not sensitive — just display copy).
        // The actual password is never fetched here; it's verified server-side, see below.
        async function loadGateContent() {
            try {
                let data;
                const draft = localStorage.getItem('tatc_cms');
                if (draft) {
                    try { data = JSON.parse(draft); } catch(e) {}
                }
                if (!data) {
                    const r = await fetch('content.json?t=' + Date.now());
                    data = await r.json();
                }

                // Per-gate title/description (set on the tatc_gate post itself)
                // only live in WordPress — fetch directly, fall back to the
                // general gate text if this page has none of its own.
                let wpData = null;
                try {
                    const wr = await fetch('https://throughalltheclutter.com/cms/wp-json/tatc/v1/content?t=' + Date.now());
                    if (wr.ok) wpData = await wr.json();
                } catch (e) {}

                const perGate = wpData?.security?.gates?.[pageName];
                const sec = data.security;
                if (sec || perGate) {
                    gateTitle.textContent = perGate?.gate_title || sec?.gate_title || "ASWEETKID";
                    gateInfo.textContent  = perGate?.gate_description || sec?.gate_description || "";
                }
            } catch (e) { console.error("Gate load fail", e); }
        }
        loadGateContent();

        // Handle Access — verified server-side via WordPress; the real password
        // never reaches this page. If WordPress is unreachable, access is denied
        // (no insecure local fallback).
        pForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const val = pInput.value.trim();
            enterBtn.disabled = true;

            let ok = false;
            try {
                const res = await fetch('https://throughalltheclutter.com/cms/wp-json/tatc/v1/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ page: pageName, password: val })
                });
                const result = await res.json();
                ok = !!result.ok;
            } catch (err) {
                console.warn('No se pudo verificar el password (¿WordPress caído?)', err);
            }

            if (ok) {
                sessionStorage.setItem(unlockKey, 'true');
                window.location.replace(redirectPage);
                return;
            }

            enterBtn.disabled = false;
            gsap.to(pForm, { x: 10, repeat: 5, yoyo: true, duration: 0.05, onComplete: () => gsap.set(pForm, {x: 0}) });
            pInput.value = "";
            pInput.placeholder = "Incorrect Access Code";
        });

        // Password visibility toggle logic
        const tPass = document.getElementById('tPass');
        const eOpen = document.getElementById('eOpen');
        const eClosed = document.getElementById('eClosed');

        tPass.addEventListener('click', () => {
            const isPassword = pInput.type === 'password';
            pInput.type = isPassword ? 'text' : 'password';
            eOpen.style.display = isPassword ? 'none' : 'block';
            eClosed.style.display = isPassword ? 'block' : 'none';
        });
    </script>
</body>
