<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATC — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
/* ── admin overrides on top of site styles ── */
:root{
  --adm-sidebar:260px;
  --adm-accent:#6366f1;
  --adm-bg:#0a0a0c;
  --adm-surface:rgba(255,255,255,.04);
  --adm-border:rgba(255,255,255,.08);
  --adm-ok:#34d399;
  --adm-err:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--adm-bg);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;color:#ececec}

/* auth */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--adm-bg);z-index:999}
.auth-box{background:rgba(255,255,255,.03);border:1px solid var(--adm-border);border-radius:14px;padding:3rem 2.5rem;width:360px;text-align:center}
.auth-logo{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:2rem}
.auth-box h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.auth-box p{color:rgba(255,255,255,.4);font-size:.85rem;margin-bottom:2rem}
.auth-input{width:100%;padding:.9rem;background:rgba(0,0,0,.3);border:1px solid var(--adm-border);border-radius:8px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:1rem;letter-spacing:.15em;text-align:center;outline:none;transition:.2s}
.auth-input:focus{border-color:var(--adm-accent)}
.auth-btn{width:100%;margin-top:.75rem;padding:.9rem;background:var(--adm-accent);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:.95rem;transition:.2s}
.auth-btn:hover{opacity:.9}
.auth-err{color:var(--adm-err);font-size:.8rem;margin-top:.6rem;min-height:1rem;opacity:0;transition:.3s}

/* layout */
#ui{display:none;height:100%;grid-template-columns:var(--adm-sidebar) 1fr}
#ui.on{display:grid}
.sidebar{background:rgba(255,255,255,.025);border-right:1px solid var(--adm-border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:1.5rem;border-bottom:1px solid var(--adm-border)}
.sb-brand{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.25rem}
.sb-title{font-size:1rem;font-weight:700}
.sb-nav{flex:1;overflow-y:auto;padding:.75rem 0}
.sb-cat{padding:.5rem 1.5rem .25rem;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.22);margin-top:.25rem}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.5rem;cursor:pointer;font-size:.83rem;color:rgba(255,255,255,.45);border-left:2px solid transparent;transition:.15s}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.03)}
.sb-item.active{color:#fff;border-left-color:var(--adm-accent);background:rgba(99,102,241,.12)}
.sb-item-lbl{display:flex;align-items:center;gap:.6rem}
.sb-view{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.2);text-decoration:none;transition:.2s;padding:.2rem .4rem;border:1px solid transparent;border-radius:4px}
.sb-view:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.sb-foot{border-top:1px solid var(--adm-border);padding:1rem;gap:.5rem;display:flex;flex-direction:column}
.btn-save{width:100%;padding:.75rem;background:var(--adm-accent);border:none;border-radius:8px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.2s}
.btn-save:hover{opacity:.9}
.btn-export{width:100%;padding:.65rem;background:transparent;border:1px solid var(--adm-border);border-radius:8px;color:rgba(255,255,255,.45);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.2s}
.btn-export:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.btn-home{width:100%;padding:.55rem;background:transparent;border:none;color:rgba(255,255,255,.3);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.2s;text-decoration:none;display:block;text-align:center}
.btn-home:hover{color:#fff}
#sb-status{font-family:'IBM Plex Mono',monospace;font-size:9px;text-align:center;min-height:14px;transition:.3s}
#sb-status.ok{color:var(--adm-ok)}#sb-status.err{color:var(--adm-err)}

/* main */
.main{overflow-y:auto}
.panel{display:none;padding:2.5rem 3rem;max-width:860px;animation:fi .25s ease}
.panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{margin-bottom:2rem}.ph-cat{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:.4rem}.ph-title{font-size:1.5rem;font-weight:700;letter-spacing:-.03em}.ph-desc{color:rgba(255,255,255,.35);font-size:.83rem;margin-top:.3rem}

/* sections */
.sec{margin-bottom:1.75rem}
.sec-hd{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.9rem;display:flex;align-items:center;gap:.6rem}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--adm-border)}
.card{background:rgba(255,255,255,.03);border:1px solid var(--adm-border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}

/* fields */
.fld{margin-bottom:1rem}.fld:last-child{margin-bottom:0}
.fld label{display:block;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.35rem}
.fld .hint{font-size:.72rem;color:rgba(255,255,255,.2);margin-top:.3rem}
.fi,.ft,.fs{width:100%;padding:.7rem .9rem;background:rgba(0,0,0,.25);border:1px solid var(--adm-border);border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:.2s}
.fi:focus,.ft:focus,.fs:focus{border-color:var(--adm-accent);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.ft{min-height:90px;resize:vertical;line-height:1.6}
.fs{cursor:pointer;appearance:none}
input[type=color].fi{padding:.3rem;height:42px;cursor:pointer}
input[type=range].fi{padding:.4rem 0;background:none;border:none;cursor:pointer}

/* typography preview */
.typo-row{display:grid;grid-template-columns:140px 1fr auto;gap:.75rem;align-items:center;padding:.75rem 0;border-bottom:1px solid var(--adm-border)}
.typo-row:last-child{border:none}
.typo-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4)}
.typo-preview{overflow:hidden;padding:.25rem 0}

/* vis table */
.vis-table{width:100%;border-collapse:collapse}
.vis-table th,.vis-table td{padding:.65rem .9rem;border-bottom:1px solid var(--adm-border);font-size:.82rem;text-align:left}
.vis-table tr:last-child td{border:none}
.vis-table th{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1px}
.badge.public{background:rgba(52,211,153,.1);color:var(--adm-ok)}
.badge.private{background:rgba(248,113,113,.1);color:var(--adm-err)}

/* post/project items */
.list-item{display:flex;align-items:center;gap:.75rem;padding:.8rem .9rem;border:1px solid var(--adm-border);border-radius:8px;margin-bottom:.6rem;cursor:pointer;transition:.2s}
.list-item:hover{border-color:var(--adm-accent);background:rgba(99,102,241,.07)}
.list-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.3);min-width:65px}
.list-title{flex:1;font-size:.88rem}
.list-actions{display:flex;gap:.4rem;margin-left:auto}
.btn-sm{display:inline-flex;align-items:center;padding:.3rem .65rem;border-radius:6px;font-size:.75rem;cursor:pointer;border:1px solid var(--adm-border);background:transparent;color:rgba(255,255,255,.4);transition:.2s}
.btn-sm:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.btn-sm.danger{border-color:rgba(248,113,113,.25);color:var(--adm-err)}
.btn-sm.danger:hover{background:rgba(248,113,113,.1)}
.btn-accent{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.1rem;border-radius:8px;background:var(--adm-accent);border:none;color:#fff;font-size:.83rem;font-weight:500;cursor:pointer;transition:.2s}
.btn-accent:hover{opacity:.9}

/* artwork item */
.art-item{display:flex;align-items:flex-start;gap:1rem;padding:1rem;background:rgba(0,0,0,.2);border:1px solid var(--adm-border);border-radius:10px;margin-bottom:.75rem}
.art-thumb{width:60px;height:78px;object-fit:cover;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid var(--adm-border);flex-shrink:0}
.art-thumb.missing{display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.15);font-size:.6rem}

/* upload */
.upload-zone{border:2px dashed var(--adm-border);border-radius:10px;padding:2.5rem;text-align:center;cursor:pointer;transition:.2s;background:rgba(0,0,0,.15);margin-bottom:1rem}
.upload-zone:hover{border-color:var(--adm-accent);background:rgba(99,102,241,.04)}
.upload-zone p{color:rgba(255,255,255,.3);font-size:.83rem;margin-top:.5rem}

/* post editor */
#post-editor{display:none}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .8rem;border-radius:6px;border:1px solid var(--adm-border);background:transparent;color:rgba(255,255,255,.4);font-size:.8rem;cursor:pointer;margin-bottom:1.25rem;transition:.2s}
.back-btn:hover{color:#fff}
.block-item{background:rgba(0,0,0,.2);border:1px solid var(--adm-border);border-radius:10px;padding:1rem;margin-bottom:.75rem}
.block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.block-type{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3)}

/* scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--adm-border);border-radius:4px}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">TATC Studio</div>
    <h1>Admin</h1><p>Enter your access code</p>
    <input class="auth-input" type="password" id="auth-pass" placeholder="••••••••" autocomplete="off">
    <button class="auth-btn" id="auth-btn">Continue →</button>
    <div class="auth-err" id="auth-err">Invalid code.</div>
  </div>
</div>

<!-- ADMIN UI -->
<div id="ui">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-brand">Studio CMS</div>
      <div class="sb-title">TATC Admin</div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-foot">
      <button class="btn-save" onclick="saveAll()">💾 Save — Apply to Site</button>
      <button class="btn-export" onclick="exportJSON()">↓ Export content.json</button>
      <a href="../index.html" class="btn-home">← Back to Site</a>
      <div id="sb-status"></div>
    </div>
  </aside>
  <main class="main" id="main-area"></main>
</div>

<script>
/* ══════════════════════════════════════════
   TATC ADMIN v3 — All pages, save to web
══════════════════════════════════════════ */
const PASSES = ['tatc2026','TATC2026','admin','sweet'];
let DATA = {}, currentPostSlug = null;

// ── AUTH ──
const authEl   = document.getElementById('auth');
const uiEl     = document.getElementById('ui');
const authPass = document.getElementById('auth-pass');
const authBtn  = document.getElementById('auth-btn');
const authErr  = document.getElementById('auth-err');

if (localStorage.getItem('tatc_admin') === '1') unlock();
authBtn.onclick = tryAuth;
authPass.onkeypress = e => e.key==='Enter' && tryAuth();

function tryAuth() {
  if (PASSES.includes(authPass.value.trim())) {
    localStorage.setItem('tatc_admin','1'); unlock();
  } else {
    authErr.style.opacity='1'; authPass.value='';
    setTimeout(()=>authErr.style.opacity='0',2200);
  }
}

async function unlock() {
  authEl.style.opacity='0'; setTimeout(()=>authEl.style.display='none',400);
  uiEl.classList.add('on');
  await loadData(); buildNav(); renderPanel(NAV[0].id);
}

// ── NAV CONFIG ──
const NAV = [
  { id:'global',   label:'Global Settings',   icon:'⊕', cat:'Global' },
  { id:'security', label:'Access & Security', icon:'⬡', cat:null },
  { id:'typo',     label:'Typography',        icon:'Aa', cat:null },
  { id:'home',     label:'Home',              icon:'⌂',  cat:'Pages', view:'../index.html' },
  { id:'blog',     label:'Blog / The Gist',  icon:'≡',  cat:null,    view:'../blog.html' },
  { id:'posts',    label:'Posts',             icon:'⊞',  cat:null },
  { id:'password', label:'Password Gate',    icon:'⬡',  cat:null,    view:'../password.html' },
  { id:'projects', label:'Projects List',    icon:'⊟',  cat:null,    view:'../projects.html' },
  { id:'project',  label:'Project Detail',   icon:'⊡',  cat:null,    view:'../project-page.html?project=a-sweet-kid' },
  { id:'gallery',  label:'3D Gallery',       icon:'◈',  cat:null,    view:'../a-sweet-kid-online.html' },
  { id:'artist',   label:'Artist / Info',    icon:'◎',  cat:null,    view:'../artist.html' },
];

function buildNav() {
  const nav = document.getElementById('sb-nav');
  let html = '';
  NAV.forEach(n => {
    if (n.cat) html += `<div class="sb-cat">${n.cat}</div>`;
    const viewBtn = n.view ? `<a class="sb-view" href="${n.view}" target="_blank" title="View page">↗</a>` : '';
    html += `<div class="sb-item" data-id="${n.id}" onclick="renderPanel('${n.id}')"><span class="sb-item-lbl">${n.icon}&nbsp;${n.label}</span>${viewBtn}</div>`;
  });
  nav.innerHTML = html;
}

// ── DATA ──
async function loadData() {
  try {
    const draft = localStorage.getItem('tatc_cms');
    if (draft) DATA = JSON.parse(draft);
    const r = await fetch('../content.json?t='+Date.now());
    if (r.ok) {
      const f = await r.json();
      if (!Object.keys(DATA).length) DATA = f;
      else Object.keys(f).forEach(k=>{ if(!(k in DATA)) DATA[k]=f[k]; });
    }
  } catch(e){}
}

// ── PANELS ──
const PANELS = {};

PANELS.global = () => `
<div class="ph"><div class="ph-cat">Configuration</div><div class="ph-title">Global Settings</div><div class="ph-desc">Brand, social links, nav labels</div></div>
<div class="sec"><div class="sec-hd">Brand</div><div class="card grid2">
  <div class="fld"><label>Brand Name</label><input class="fi" id="g-brand"></div>
  <div class="fld"><label>Tagline</label><input class="fi" id="g-tagline"></div>
  <div class="fld"><label>Year</label><input class="fi" id="g-year"></div>
</div></div>
<div class="sec"><div class="sec-hd">Social Links</div><div class="card grid2">
  <div class="fld"><label>Twitter / X URL</label><input class="fi" id="g-tw"></div>
  <div class="fld"><label>Instagram URL</label><input class="fi" id="g-ig"></div>
  <div class="fld"><label>Email</label><input class="fi" id="g-email"></div>
</div></div>
<div class="sec"><div class="sec-hd">Nav Labels</div><div class="card grid3">
  <div class="fld"><label>Blog Label</label><input class="fi" id="g-nav-blog"></div>
  <div class="fld"><label>Projects Label</label><input class="fi" id="g-nav-projects"></div>
  <div class="fld"><label>Info Label</label><input class="fi" id="g-nav-info"></div>
</div></div>`;

PANELS.security = () => `
<div class="ph"><div class="ph-cat">System</div><div class="ph-title">Access & Security</div><div class="ph-desc">Gateway lock screen and per-page visibility with individual passwords</div></div>
<div class="sec"><div class="sec-hd">Default Gate Lock Screen</div><div class="card grid2">
  <div class="fld"><label>Default Password</label><input class="fi" id="sec-pass"><div class="hint">Fallback for private pages without a specific password</div></div>
  <div class="fld"><label>Gate Title (hero text)</label><input class="fi" id="sec-title"></div>
  <div class="fld" style="grid-column:1/-1"><label>Gate Description / Teaser</label><textarea class="ft" id="sec-desc" style="min-height:60px"></textarea></div>
</div></div>
<div class="sec"><div class="sec-hd">Page Visibility & Passwords</div>
<div class="hint" style="margin-bottom:.75rem;color:rgba(255,255,255,.25);font-size:.78rem">Private pages use the password.html gate. Leave &quot;Page Password&quot; blank to use the default.</div>
<div class="card" style="padding:0;overflow:hidden">
<table class="vis-table"><thead><tr><th>Page</th><th>Status</th><th>Visibility</th><th>Page Password</th></tr></thead><tbody id="vis-body"></tbody></table>
</div></div>`;

PANELS.typo = () => `
<div class="ph"><div class="ph-cat">Design</div><div class="ph-title">Typography</div><div class="ph-desc">Font size, weight, letter-spacing per text level</div></div>
<div class="sec"><div class="sec-hd">Text Levels</div><div class="card">
${['heading_h1','heading_h2','nav','body','label'].map(k=>`
<div class="typo-row" id="tr-${k}">
  <div class="typo-label">${k.replace('_',' ')}</div>
  <div class="typo-preview" id="tp-${k}"></div>
  <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;min-width:320px">
    <div class="fld" style="margin:0;min-width:80px"><label>Size</label><input class="fi" id="ty-${k}-size" style="padding:.4rem .5rem;font-size:.78rem" oninput="previewTypo('${k}')"></div>
    <div class="fld" style="margin:0;min-width:70px"><label>Weight</label><input class="fi" id="ty-${k}-weight" style="padding:.4rem .5rem;font-size:.78rem" oninput="previewTypo('${k}')"></div>
    <div class="fld" style="margin:0;min-width:90px"><label>Spacing</label><input class="fi" id="ty-${k}-spacing" style="padding:.4rem .5rem;font-size:.78rem" oninput="previewTypo('${k}')"></div>
    <div class="fld" style="margin:0;min-width:110px"><label>Transform</label>
      <select class="fs" id="ty-${k}-transform" style="padding:.4rem .5rem;font-size:.78rem" onchange="previewTypo('${k}')">
        <option>none</option><option>uppercase</option><option>lowercase</option><option>capitalize</option>
      </select>
    </div>
  </div>
</div>`).join('')}
</div></div>`;

PANELS.home = () => `
<div class="ph"><div class="ph-cat">Page</div><div class="ph-title">Home</div></div>
<div class="sec"><div class="sec-hd">SEO</div><div class="card">
  <div class="fld"><label>Meta Title</label><input class="fi" id="h-meta"></div>
</div></div>
<div class="sec"><div class="sec-hd">Hero</div><div class="card">
  <div class="fld"><label>Hero Headline</label><input class="fi" id="h-hero"></div>
</div></div>
<div class="sec"><div class="sec-hd">Loader / Intro</div><div class="card">
  <div class="fld"><label>Loader Copy</label><textarea class="ft" id="h-loader" style="min-height:130px"></textarea><div class="hint">Animates word-by-word. Keep it impactful.</div></div>
  <div class="fld"><label>Skip Button Label</label><input class="fi" id="h-skip"></div>
</div></div>`;

PANELS.blog = () => `
<div class="ph"><div class="ph-cat">Page</div><div class="ph-title">Blog · The Gist</div></div>
<div class="sec"><div class="sec-hd">Labels</div><div class="card grid2">
  <div class="fld"><label>Meta Title</label><input class="fi" id="b-meta"></div>
  <div class="fld"><label>Page H1</label><input class="fi" id="b-title"></div>
  <div class="fld"><label>Section Label (small)</label><input class="fi" id="b-label"></div>
</div></div>
<div class="sec"><div class="sec-hd">Posts Index <button class="btn-accent" style="font-size:.75rem;padding:.4rem .8rem;margin-left:1rem" onclick="addBlogPost()">+ Add Post</button></div>
<div id="blog-post-list"></div></div>`;

PANELS.posts = () => `
<div class="ph"><div class="ph-cat">Content</div><div class="ph-title">Posts</div></div>
<div id="posts-list"></div>
<div id="post-editor"></div>`;

PANELS.password = () => `
<div class="ph"><div class="ph-cat">Page</div><div class="ph-title">Password Gate</div><div class="ph-desc">The lock screen shown for private pages</div></div>
<div class="sec"><div class="sec-hd">Content</div><div class="card">
  <div class="fld"><label>Gate Title (big hero text)</label><input class="fi" id="pw-title" oninput="livePreview()"></div>
  <div class="fld"><label>Description / Teaser</label><textarea class="ft" id="pw-desc" style="min-height:60px" oninput="livePreview()"></textarea></div>
  <div class="fld"><label>Password</label><input class="fi" id="pw-pass" oninput="livePreview()"><div class="hint">Same as the gate password in Access & Security</div></div>
</div></div>`;

PANELS.projects = () => `
<div class="ph"><div class="ph-cat">Content</div><div class="ph-title">Projects List</div></div>
<div id="proj-list"></div>
<button class="btn-accent" style="margin-top:.5rem" onclick="addProject()">+ Add Project</button>`;

PANELS.project = () => `
<div class="ph"><div class="ph-cat">Content</div><div class="ph-title">Project Detail Pages</div><div class="ph-desc">Each project has a detail page at project-page.html?project=SLUG</div></div>
<div id="proj-detail-list"></div>
<button class="btn-accent" style="margin-top:.5rem" onclick="addProjectDetail()">+ Add Project Detail</button>`;

  const g=DATA.global||{}, s=DATA.security||{}, h=DATA.home||{}, b=DATA.blog||{}, g3=DATA.gallery_3d||{}, ty=DATA.typography||{};

  if (id==='global') {

// ── VIS MATRIX ──
const ALL_PAGES = ['index.html','projects.html','artist.html','blog.html','a-sweet-kid.html','a-sweet-kid-online.html','password.html'];
function renderVisMatrix(s) {
  const pages = s.pages||{}, pwds = s.page_passwords||{};
  const el = document.getElementById('vis-body');
  if (!el) return;
  el.innerHTML = ALL_PAGES.map(p => {
    const v = pages[p]||'public';
    const pw = pwds[p]||'';
    const isPrivate = v === 'private';
    return `<tr>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:.78rem">${p}</td>
      <td><span class="badge ${v}">${v}</span></td>
      <td><select class="fs" style="width:auto;padding:.3rem .6rem;font-size:.78rem" onchange="setVis('${p}',this.value)">
        <option value="public" ${!isPrivate?'selected':''}>Public</option>
        <option value="private" ${isPrivate?'selected':''}>Private</option>
      </select></td>
      <td>${isPrivate
        ? `<input class="fi" style="padding:.3rem .6rem;font-size:.78rem;width:140px" placeholder="(use default)" value="${esc(pw)}" oninput="setPagePw('${p}',this.value)">`
        : `<span style="color:rgba(255,255,255,.15);font-size:.75rem">—</span>`
      }</td>
    </tr>`;
  }).join('');
}
function setVis(p,v) {
  if(!DATA.security)DATA.security={};
  if(!DATA.security.pages)DATA.security.pages={};
  DATA.security.pages[p]=v;
  renderVisMatrix(DATA.security);
}
function setPagePw(p,v) {
  if(!DATA.security)DATA.security={};
  if(!DATA.security.page_passwords)DATA.security.page_passwords={};
  if(v) DATA.security.page_passwords[p]=v;
  else delete DATA.security.page_passwords[p];
}

// ── TYPOGRAPHY ──
function fillTypo(ty) {
  ['heading_h1','heading_h2','nav','body','label'].forEach(k=>{
    const t=ty[k]||{};
    sv(`ty-${k}-size`,t.font_size||'');sv(`ty-${k}-weight`,t.font_weight||'');
    sv(`ty-${k}-spacing`,t.letter_spacing||'');
    const sel=document.getElementById(`ty-${k}-transform`);
    if(sel)sel.value=t.text_transform||'none';
    previewTypo(k);
  });
}
function previewTypo(k) {
  const el=document.getElementById(`tp-${k}`);
  if(!el)return;
  const sz=gv(`ty-${k}-size`)||'1rem', wt=gv(`ty-${k}-weight`)||'400', sp=gv(`ty-${k}-spacing`)||'0';
  const tt=gv(`ty-${k}-transform`)||'none';
  el.style.cssText=`font-size:${sz};font-weight:${wt};letter-spacing:${sp};text-transform:${tt};color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis`;
  el.textContent='The quick brown fox';
}

function closePostEditor(){currentPostSlug=null;document.getElementById('post-editor').style.display='none';document.getElementById('posts-list').style.display='block';}
function renderPostBlocks(blocks){
  const el=document.getElementById('pe-blocks');if(!el)return;
  el.innerHTML=blocks.map((b,i)=>{
    const hd=`<div class="block-item"><div class="block-head"><span class="block-type">${b.type}</span><div style="display:flex;gap:.4rem">
      <button class="btn-sm" onclick="moveBlock(${i},-1)">↑</button><button class="btn-sm" onclick="moveBlock(${i},1)">↓</button>
      <button class="btn-sm danger" onclick="removeBlock(${i})">✕</button></div></div>`;
    if(b.type==='paragraph'||b.type==='pullquote') return hd+`<textarea class="ft" id="blk-${i}" style="min-height:80px">${esc(b.text||'')}</textarea></div>`;
    if(b.type==='image') return hd+`<div class="grid2" style="gap:.5rem">
      <div class="fld"><label>Image Path</label><input class="fi" id="blk-${i}-src" value="${esc(b.src||'')}"></div>
      <div class="fld"><label>Alt Text</label><input class="fi" id="blk-${i}-alt" value="${esc(b.alt||'')}"></div>
      <div class="fld" style="grid-column:1/-1"><label>Caption</label><input class="fi" id="blk-${i}-cap" value="${esc(b.caption||'')}"></div>
    </div></div>`;
    return hd+'</div>';
  }).join('');
}
function addBlock(type){if(!currentPostSlug)return;const body=DATA.post?.posts?.[currentPostSlug]?.body;if(!body)return;
  if(type==='paragraph')body.push({type,text:''});else if(type==='pullquote')body.push({type,text:'"..."'});else body.push({type,src:'',alt:'',caption:''});
  renderPostBlocks(body);}
function moveBlock(i,d){const body=DATA.post?.posts?.[currentPostSlug]?.body;if(!body)return;const ni=i+d;if(ni<0||ni>=body.length)return;[body[i],body[ni]]=[body[ni],body[i]];renderPostBlocks(body);}
function removeBlock(i){const body=DATA.post?.posts?.[currentPostSlug]?.body;if(!body)return;body.splice(i,1);renderPostBlocks(body);}
function savePost(){if(!currentPostSlug)return;
  const post=DATA.post.posts[currentPostSlug];
  post.meta_title=gv('pe-meta');post.subject=gv('pe-subject');post.date=gv('pe-date');post.title=gv('pe-title');
  post.footer_label=gv('pe-footer-lbl');post.footer_credit=gv('pe-footer-cred');
  const be=DATA.blog?.posts?.find(p=>p.slug===currentPostSlug);
  if(be){be.summary=gv('pe-summary');be.date=post.date;be.title=post.title;}
  const body=post.body||[];
  body.forEach((b,i)=>{
    if(b.type==='paragraph'||b.type==='pullquote')b.text=gv(`blk-${i}`)||'';
    if(b.type==='image'){b.src=gv(`blk-${i}-src`);b.alt=gv(`blk-${i}-alt`);b.caption=gv(`blk-${i}-cap`);}
  });
  document.getElementById('pe-heading').textContent=post.title;setStatus('Post saved','ok');}

function saveAll(){
  if(currentPostSlug)savePost();
  collectAll();
  // Save to localStorage — cms-engine.js picks this up site-wide
  localStorage.setItem('tatc_cms', JSON.stringify(DATA));
  setStatus('Saved — site updated ✓','ok');
}

function exportJSON(){
  saveAll();
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='content.json';a.click();
  URL.revokeObjectURL(url);
  setStatus('content.json exported ↓','ok');
}
